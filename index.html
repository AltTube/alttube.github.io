<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YouTube Instant Watch</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f0f0f;
        --surface: #1a1a1a;
        --surface-hover: #252525;
        --text: #f1f1f1;
        --muted: #aaaaaa;
        --accent: #ff0033;
        --border: #333;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: radial-gradient(circle at top, #1f1f1f 0%, var(--bg) 45%);
        color: var(--text);
        min-height: 100vh;
      }

      .app {
        max-width: 1100px;
        margin: 0 auto;
        padding: 2rem 1rem 3rem;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(1.8rem, 3vw, 2.4rem);
      }

      p.subtitle {
        margin: 0 0 1.5rem;
        color: var(--muted);
      }

      .search-row {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }

      input[type='search'] {
        flex: 1 1 320px;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: #111;
        color: var(--text);
        padding: 0.85rem 1rem;
        font-size: 1rem;
      }

      button {
        border: none;
        border-radius: 12px;
        background: var(--accent);
        color: white;
        font-weight: 600;
        padding: 0.85rem 1.2rem;
        cursor: pointer;
      }

      button:disabled {
        opacity: 0.6;
        cursor: progress;
      }

      .status {
        min-height: 1.4rem;
        color: var(--muted);
        margin-bottom: 1rem;
      }

      .layout {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 1rem;
      }

      .player-card,
      .results {
        background: color-mix(in srgb, var(--surface), #000 8%);
        border: 1px solid var(--border);
        border-radius: 16px;
        overflow: hidden;
      }

      .player {
        position: relative;
        padding-top: 56.25%;
        background: #000;
      }

      iframe {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
      }

      .player-meta {
        padding: 1rem;
      }

      .player-meta h2 {
        font-size: 1.05rem;
        margin: 0 0 0.35rem;
      }

      .player-meta p {
        margin: 0;
        color: var(--muted);
        font-size: 0.9rem;
      }

      .results {
        max-height: 70vh;
        overflow: auto;
      }

      .result-item {
        display: grid;
        grid-template-columns: 120px 1fr;
        gap: 0.75rem;
        width: 100%;
        border: none;
        border-bottom: 1px solid var(--border);
        border-radius: 0;
        text-align: left;
        padding: 0.75rem;
        background: transparent;
      }

      .result-item:hover,
      .result-item.active {
        background: var(--surface-hover);
      }

      .result-item img {
        width: 120px;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        border-radius: 8px;
      }

      .result-item .title {
        display: block;
        font-size: 0.95rem;
        line-height: 1.35;
        margin-bottom: 0.35rem;
      }

      .result-item .channel {
        display: block;
        color: var(--muted);
        font-size: 0.85rem;
      }

      @media (max-width: 900px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .results {
          max-height: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>YouTube Instant Watch</h1>
      <p class="subtitle">Search videos and play them immediately without leaving this page.</p>

      <form id="searchForm" class="search-row">
        <input
          id="queryInput"
          type="search"
          placeholder="Search YouTube videos..."
          autocomplete="off"
          required
        />
        <button id="searchButton" type="submit">Search</button>
      </form>

      <p id="status" class="status" aria-live="polite"></p>

      <section class="layout">
        <article class="player-card">
          <div class="player">
            <iframe
              id="youtubePlayer"
              src=""
              title="YouTube video player"
              loading="lazy"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
              allowfullscreen
            ></iframe>
          </div>
          <div class="player-meta">
            <h2 id="playerTitle">Search for a video to start watching</h2>
            <p id="playerChannel"></p>
          </div>
        </article>

        <aside id="results" class="results" aria-label="Search results"></aside>
      </section>
    </main>

    <script>
      const API_KEY = 'AIzaSyA_InaxCb8wmJee74OvhKvmbKMbgYWAxx8';
      const MAX_RESULTS = 12;

      const form = document.getElementById('searchForm');
      const queryInput = document.getElementById('queryInput');
      const searchButton = document.getElementById('searchButton');
      const status = document.getElementById('status');
      const resultsContainer = document.getElementById('results');
      const player = document.getElementById('youtubePlayer');
      const playerTitle = document.getElementById('playerTitle');
      const playerChannel = document.getElementById('playerChannel');

      let currentVideoId = null;

      function setStatus(message) {
        status.textContent = message;
      }

      function formatVideoUrl(videoId) {
        const params = new URLSearchParams({ autoplay: '1', rel: '0' });
        return `https://www.youtube.com/embed/${videoId}?${params.toString()}`;
      }

      function playVideo(video) {
        currentVideoId = video.id.videoId;
        player.src = formatVideoUrl(video.id.videoId);
        playerTitle.textContent = video.snippet.title;
        playerChannel.textContent = `Channel: ${video.snippet.channelTitle}`;

        document.querySelectorAll('.result-item').forEach((button) => {
          button.classList.toggle('active', button.dataset.videoId === currentVideoId);
        });
      }

      function renderResults(videos) {
        resultsContainer.innerHTML = '';

        if (videos.length === 0) {
          setStatus('No videos found. Try a different search term.');
          return;
        }

        const fragment = document.createDocumentFragment();

        videos.forEach((video) => {
          const item = document.createElement('button');
          item.className = 'result-item';
          item.type = 'button';
          item.dataset.videoId = video.id.videoId;

          const thumb = video.snippet.thumbnails.medium || video.snippet.thumbnails.default;

          item.innerHTML = `
            <img src="${thumb.url}" alt="Thumbnail for ${video.snippet.title}" loading="lazy" />
            <div>
              <span class="title">${video.snippet.title}</span>
              <span class="channel">${video.snippet.channelTitle}</span>
            </div>
          `;

          item.addEventListener('click', () => playVideo(video));
          fragment.appendChild(item);
        });

        resultsContainer.appendChild(fragment);
        playVideo(videos[0]);
        setStatus(`Showing ${videos.length} result${videos.length === 1 ? '' : 's'}.`);
      }

      async function searchVideos(query) {
        const params = new URLSearchParams({
          part: 'snippet',
          type: 'video',
          maxResults: String(MAX_RESULTS),
          q: query,
          key: API_KEY,
        });

        const response = await fetch(`https://www.googleapis.com/youtube/v3/search?${params.toString()}`);

        if (!response.ok) {
          throw new Error(`API request failed (${response.status})`);
        }

        const data = await response.json();
        return data.items || [];
      }

      form.addEventListener('submit', async (event) => {
        event.preventDefault();

        const query = queryInput.value.trim();
        if (!query) {
          setStatus('Enter a search term first.');
          return;
        }

        setStatus('Searching...');
        searchButton.disabled = true;

        try {
          const videos = await searchVideos(query);
          renderResults(videos);
        } catch (error) {
          console.error(error);
          setStatus('Could not load videos. Check API key quota/settings and try again.');
        } finally {
          searchButton.disabled = false;
        }
      });

      queryInput.value = 'lofi hip hop';
      form.requestSubmit();
    </script>
  </body>
</html>
